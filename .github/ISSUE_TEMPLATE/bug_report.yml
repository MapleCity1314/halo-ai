name: Bug Report
description: Report a bug with Halo SDK.
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the information below to help us reproduce and fix it.
  - type: textarea
    attributes:
      label: Description
      description: What went wrong? Include reproduction steps, error messages, and expected vs actual behavior.
      placeholder: |
        1. Create an agent with ...
        2. Call agent.generateText(...)
        3. Expected ..., but got ...
    validations:
      required: true
  - type: input
    attributes:
      label: Halo SDK Version
      description: Which version are you using?
      placeholder: e.g. @halo-sdk/core@0.2.0
    validations:
      required: true
  - type: input
    attributes:
      label: Node Version
      description: Run "node -v" to get your version
      placeholder: e.g. v22.0.0
    validations:
      required: false
  - type: input
    attributes:
      label: Adapter & Model
      description: Which adapter and model are you using?
      placeholder: e.g. DeepSeekAdapter with deepseek-v4-flash
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
